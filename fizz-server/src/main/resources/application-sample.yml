spring:
  output:
    ansi:
      enabled: always
  application:
    name: fizz
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/fizz?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8mb4
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false

fizz:
  scheduler:
    heartbeat-timeout-seconds: 60
  notification:
    retry-interval-ms: 5000
    max-attempts: 10
    timeout-ms: 10000
